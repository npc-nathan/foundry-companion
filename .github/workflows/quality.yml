name: Quality Gate
on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint -- --max-warnings=50

      - name: Prettier check
        run: npm run format

      - name: TypeScript check
        run: npm run type-check

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit & component tests
        run: npx vitest run tests/setup-test.test.tsx tests/sidebar.test.tsx tests/CharacterSheet.test.tsx tests/env-debug.test.ts
