<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Warhammer skull-and-gear icon -->
  <defs>
    <linearGradient id="wh-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#2d0f0f"/>
    </linearGradient>
  </defs>
  <rect width="48" height="48" rx="4" fill="url(#wh-bg)" stroke="#8b0000" stroke-width="1"/>
  <!-- Gear teeth (outer ring) -->
  <circle cx="24" cy="24" r="16" fill="none" stroke="#8b0000" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="24" cy="24" r="13" fill="none" stroke="#5c0000" stroke-width="1"/>
  <!-- Skull outline -->
  <path d="M24 13 C18 13 16 17 16 21 C16 24 18 27 17 30 L20 30 L20 26 L28 26 L28 30 L31 30 C30 27 32 24 32 21 C32 17 30 13 24 13 Z" fill="none" stroke="#cc0000" stroke-width="1.5"/>
  <!-- Eyes -->
  <circle cx="20" cy="21" r="2" fill="#cc0000"/>
  <circle cx="28" cy="21" r="2" fill="#cc0000"/>
  <!-- Crossed bones -->
  <line x1="12" y1="36" x2="36" y2="36" stroke="#8b0000" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="32" x2="12" y2="40" stroke="#8b0000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="32" x2="36" y2="40" stroke="#8b0000" stroke-width="1.5" stroke-linecap="round"/>
</svg>
